<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APOSTOL — Торговая статуя</title>
    <style>
        :root {
            --bg: #1a1410;
            --surface: #2a2118;
            --border: #5a4a32;
            --text: #d4c5a9;
            --accent: #e8a849;
            --accent-glow: rgba(232, 168, 73, 0.5);
            --pink: #d96c8e;              /* акцент под розовые кристаллы */
            --pink-glow: rgba(217, 108, 142, 0.5);
            --danger: #b85c3a;
            --font: 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    /* Фоновое изображение */
    background-image: url('https://apostolgm.github.io/Stat-interface/Statuya.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;  /* чтобы не скроллилось */
    position: relative;
}

/* Затемняющий слой поверх фона, чтобы терминал был читаем */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6); /* степень затемнения, можно регулировать */
    z-index: 0;
    pointer-events: none;
}

.terminal {
    position: relative;
    z-index: 1; /* поверх затемнения */
}

        /* Пыль на экране (статический шум) */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.04"/></svg>');
            pointer-events: none;
            z-index: 100;
        }

        .terminal {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* Шапка */
        .header {
            background: #1f1810;
            border-bottom: 2px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 24px;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            margin: 0;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .balance {
            background: #0d0a06;
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 18px;
        }
        .balance span {
            color: var(--pink);
            font-weight: bold;
            text-shadow: 0 0 8px var(--pink-glow);
        }

        /* Кнопка звука */
        .sound-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .sound-btn:hover {
            background: var(--accent);
            color: #1a1410;
        }

        /* Навигация */
        .main-tabs {
            display: flex;
            background: #1a130c;
            border-bottom: 2px solid var(--border);
        }
        .main-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7a62;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            user-select: none;
        }
        .main-tab:hover { color: var(--accent); background: #2a1f14; }
        .main-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: #2a1f14;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .sub-tabs {
            display: flex;
            background: #1a130c;
            border-bottom: 1px solid var(--border);
        }
        .sub-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            color: #8b7a62;
            font-size: 14px;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }
        .sub-tab:hover { color: var(--accent); background: #2a1f14; }
        .sub-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: bold;
        }

        .content {
            padding: 15px;
            min-height: 300px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .card {
            background: #1f1810;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }
        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(232,168,73,0.2);
        }
        .card h3 {
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 16px;
        }
        .card .desc {
            font-size: 12px;
            color: #a6957a;
            flex-grow: 1;
            margin-bottom: 10px;
        }
        .card .price {
            font-weight: bold;
            color: var(--pink);
            margin-bottom: 8px;
        }
        .card button {
            background: var(--accent);
            color: #1a1410;
            border: none;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            font-family: var(--font);
        }
        .card button:hover {
            background: #f0b954;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .card button:disabled {
            background: #5a4a32;
            color: #8b7a62;
            cursor: not-allowed;
        }

        .lootbox-card {
            text-align: center;
            padding: 20px;
        }
        .lootbox-card h3 { font-size: 20px; }
        .lootbox-card .roll-btn {
            background: var(--danger);
            color: #fff;
            font-size: 18px;
            padding: 10px 25px;
            margin-top: 10px;
        }
        .lootbox-result {
            margin-top: 15px;
            padding: 10px;
            background: #0d0a06;
            border: 1px solid var(--border);
            border-radius: 6px;
            min-height: 40px;
            text-align: center;
        }

        .inventory-list {
            list-style: none;
        }
        .inventory-list li {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .inventory-list li:last-child { border-bottom: none; }
        .item-count { color: var(--pink); }

        .hidden { display: none; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <h1>APOSTOL</h1>
        <div class="header-controls">
            <div class="balance">
                РК: <span id="balanceDisplay">3</span>
            </div>
            <button id="soundToggle" class="sound-btn" title="Вкл/Выкл звук">🔊</button>
        </div>
    </div>

    <div class="main-tabs">
        <div class="main-tab active" data-tab="shop">Магазин</div>
        <div class="main-tab" data-tab="inventory">Инвентарь</div>
    </div>

    <div id="shopSubTabs" class="sub-tabs">
        <div class="sub-tab active" data-sub="food">Еда</div>
        <div class="sub-tab" data-sub="weapons">Оружие</div>
        <div class="sub-tab" data-sub="bestiary">Бестиарий</div>
        <div class="sub-tab" data-sub="lootboxes">Лутбоксы</div>
    </div>

    <div id="content" class="content"></div>
</div>

<script>
    // ==================== СОСТОЯНИЕ ====================
    const state = {
        tokens: 3,
        inventory: [],
        currentMainTab: 'shop',
        currentSubTab: 'food',
        soundEnabled: false
    };

    // ==================== ТОВАРЫ (цены в РК) ====================
    const shopItems = {
        food: [
            { id: 'canned_meat', name: 'Консервы "Тушёнка"', desc: 'Просрочена, но съедобна.', price: 1 },
            { id: 'water_flask', name: 'Фляга с водой', desc: 'Чистая, без радиации.', price: 1 },
            { id: 'crackers', name: 'Галеты', desc: 'Твёрдые как камень.', price: 1 },
            { id: 'mutant_steak', name: 'Стейк мутанта', desc: '+2 к сытости.', price: 2 }
        ],
        weapons: [
            { id: 'rusty_knife', name: 'Ржавый нож', desc: 'Урон 1d4.', price: 2 },
            { id: 'pipe_pistol', name: 'Трубный пистолет', desc: 'Калибр .38.', price: 3 },
            { id: 'frag_grenade', name: 'Осколочная граната', desc: 'Радиус 3 м.', price: 4 }
        ],
        bestiary: [
            { id: 'radroach_info', name: 'Радтаракан', desc: 'Боится света. Слабое место: усы.', price: 0 },
            { id: 'ghoul_info', name: 'Гуль', desc: 'Обезвредить: выстрел в голову.', price: 0 },
            { id: 'deathclaw_info', name: 'Коготь смерти', desc: 'Уязвим к плазме.', price: 0 }
        ],
        lootboxes: [
            { id: 'box_humanitarian', name: 'Гуманитарка', desc: 'Обычный предмет.', price: 1 },
            { id: 'box_junk', name: 'Барахло-Х', desc: 'Шанс на редкий.', price: 2 },
            { id: 'box_specialist', name: 'Специалист', desc: 'Редкие и легендарные.', price: 3 }
        ]
    };

    const lootTables = {
        box_humanitarian: [
            { name: 'Банка тушенки', rarity: 'Обычный' },
            { name: 'Фляга с водой', rarity: 'Обычный' },
            { name: 'Бинт', rarity: 'Обычный' },
            { name: 'Батарейки', rarity: 'Обычный' },
            { name: 'Галеты', rarity: 'Обычный' },
            { name: 'Леска', rarity: 'Обычный' },
            { name: 'Пупс', rarity: 'Обычный' },
            { name: 'Флешка', rarity: 'Обычный' },
            { name: 'Гвоздь', rarity: 'Обычный' },
            { name: 'Газета', rarity: 'Обычный' }
        ],
        box_junk: [
            { name: 'Банка тушенки', rarity: 'Обычный', weight: 70 },
            { name: 'Фляга', rarity: 'Обычный', weight: 70 },
            { name: 'Набор отмычек', rarity: 'Редкий', weight: 30 },
            { name: 'Фонарь', rarity: 'Редкий', weight: 30 },
            { name: 'Карта', rarity: 'Редкий', weight: 30 },
            { name: 'Ракетница', rarity: 'Редкий', weight: 30 }
        ],
        box_specialist: [
            { name: 'Набор отмычек', rarity: 'Редкий', weight: 60 },
            { name: 'Фонарь', rarity: 'Редкий', weight: 60 },
            { name: 'Очиститель воды', rarity: 'Легендарный', weight: 40 },
            { name: 'Генератор шума', rarity: 'Легендарный', weight: 40 },
            { name: 'Имплант "Зоркий глаз"', rarity: 'Легендарный', weight: 40 }
        ]
    };

    // ==================== АУДИО ДВИЖОК (ветер) ====================
    let audioCtx = null;
    let windNode = null;
    let windGain = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Создаём белый шум
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            // Фильтр для имитации ветра
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 300;
            bandpass.Q.value = 0.2;

            // Усиление с модуляцией (завывание)
            windGain = audioCtx.createGain();
            windGain.gain.value = 0;

            noise.connect(bandpass);
            bandpass.connect(windGain);
            windGain.connect(audioCtx.destination);
            noise.start();

            // Модуляция громкости для эффекта порывов
            windNode = { noise, bandpass, gain: windGain };
            modulateWind();
        }
    }

    function modulateWind() {
        if (!windGain) return;
        const now = audioCtx.currentTime;
        // Случайные порывы
        const baseLevel = 0.15;
        const gust = Math.random() * 0.2 + 0.1;
        windGain.gain.setValueAtTime(baseLevel, now);
        windGain.gain.linearRampToValueAtTime(baseLevel + gust, now + 0.5 + Math.random());
        windGain.gain.linearRampToValueAtTime(baseLevel, now + 2 + Math.random());
        setTimeout(modulateWind, 2500);
    }

    function toggleSound() {
        initAudio();
        state.soundEnabled = !state.soundEnabled;
        const btn = document.getElementById('soundToggle');
        if (state.soundEnabled) {
            windGain.gain.value = 0.15;
            btn.textContent = '🔊';
        } else {
            windGain.gain.value = 0;
            btn.textContent = '🔇';
        }
    }

    // Первый клик по кнопке запустит AudioContext (политика автовоспроизведения)
    document.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }, { once: true });

    // ==================== ОТРИСОВКА ====================
    function updateBalance() {
        document.getElementById('balanceDisplay').textContent = state.tokens;
    }

    function renderContent() {
        const container = document.getElementById('content');
        container.innerHTML = '';
        if (state.currentMainTab === 'shop') renderShop(container);
        else if (state.currentMainTab === 'inventory') renderInventory(container);
    }

    function renderShop(container) {
        const sub = state.currentSubTab;
        if (sub === 'lootboxes') {
            renderLootboxes(container);
        } else {
            const items = shopItems[sub] || [];
            const grid = document.createElement('div');
            grid.className = 'grid';
            items.forEach(item => {
                const card = createItemCard(item);
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }
    }

    function createItemCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h3>${item.name}</h3>
            <div class="desc">${item.desc}</div>
            <div class="price">${item.price > 0 ? '💰 ' + item.price + ' РК' : 'Бесплатно'}</div>
            <button class="buy-btn" data-id="${item.id}" data-price="${item.price}" ${item.price > state.tokens ? 'disabled' : ''}>
                ${item.price > 0 ? 'Купить' : 'Изучить'}
            </button>
        `;
        card.querySelector('.buy-btn').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            const price = parseInt(btn.dataset.price);
            const id = btn.dataset.id;
            buyItem(id, price, item.name);
        });
        return card;
    }

    function renderLootboxes(container) {
        const boxes = shopItems.lootboxes;
        boxes.forEach(box => {
            const card = document.createElement('div');
            card.className = 'card lootbox-card';
            card.innerHTML = `
                <h3>${box.name}</h3>
                <div class="desc">${box.desc}</div>
                <div class="price">💰 ${box.price} РК</div>
                <button class="roll-btn" data-id="${box.id}" data-price="${box.price}" ${box.price > state.tokens ? 'disabled' : ''}>
                    Открыть
                </button>
                <div class="lootbox-result" id="result-${box.id}"></div>
            `;
            card.querySelector('.roll-btn').addEventListener('click', (e) => {
                const btn = e.currentTarget;
                const price = parseInt(btn.dataset.price);
                const id = btn.dataset.id;
                if (state.tokens < price) return;
                state.tokens -= price;
                updateBalance();
                const result = rollLoot(id);
                document.getElementById(`result-${id}`).innerHTML = 
                    `<span style="color:var(--accent);">${result.name}</span> <small>[${result.rarity}]</small>`;
                state.inventory.push(result.name);
                renderAll();
            });
            container.appendChild(card);
        });
    }

    function rollLoot(boxId) {
        const table = lootTables[boxId] || [];
        if (table.length === 0) return { name: 'Ничего', rarity: 'Пусто' };
        const totalWeight = table.reduce((sum, item) => sum + (item.weight || 1), 0);
        let random = Math.random() * totalWeight;
        for (let item of table) {
            random -= (item.weight || 1);
            if (random <= 0) return { name: item.name, rarity: item.rarity };
        }
        return table[table.length - 1];
    }

    function renderInventory(container) {
        const list = document.createElement('ul');
        list.className = 'inventory-list';
        if (state.inventory.length === 0) {
            list.innerHTML = '<li>Инвентарь пуст</li>';
        } else {
            const counts = {};
            state.inventory.forEach(item => counts[item] = (counts[item] || 0) + 1);
            for (let [name, count] of Object.entries(counts)) {
                const li = document.createElement('li');
                li.innerHTML = `<span>${name}</span><span class="item-count">x${count}</span>`;
                list.appendChild(li);
            }
        }
        container.appendChild(list);
    }

    function buyItem(id, price, name) {
        if (state.tokens < price) return;
        state.tokens -= price;
        state.inventory.push(name);
        updateBalance();
        renderAll();
    }

    function renderAll() {
        renderContent();
        updateBalance();
    }

    // ==================== НАВИГАЦИЯ ====================
    function setupTabs() {
        document.querySelectorAll('.main-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.currentMainTab = tab.dataset.tab;
                document.getElementById('shopSubTabs').classList.toggle('hidden', state.currentMainTab !== 'shop');
                renderAll();
            });
        });
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.currentSubTab = tab.dataset.sub;
                renderAll();
            });
        });
    }

    document.getElementById('soundToggle').addEventListener('click', toggleSound);

    function init() {
        setupTabs();
        renderAll();
    }

    init();
</script>
</body>
</html>
