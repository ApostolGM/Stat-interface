<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гефест v3.1 — Терминал (Локальный)</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        .crt {
            background: #0b1a0b;
            border: 20px solid #2a2a2a;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2), inset 0 0 100px rgba(0, 0, 0, 0.8);
            padding: 25px;
            width: 700px;
            max-width: 95vw;
            position: relative;
            overflow: hidden;
        }
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.1; } 50% { opacity: 0.3; } 100% { opacity: 0.05; }
        }
        .screen {
            position: relative;
            z-index: 20;
            color: #20C20E;
            text-shadow: 0 0 10px #20C20E;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            letter-spacing: 2px;
            border-bottom: 2px dashed #20C20E;
            padding-bottom: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d200d;
            padding: 8px 12px;
            border: 1px solid #20C20E;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .balance {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d200d;
            padding: 10px 15px;
            border: 1px solid #20C20E;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .nav {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .nav button {
            flex: 1;
            min-width: 60px;
            background: #0d200d;
            color: #20C20E;
            border: 2px solid #20C20E;
            padding: 10px 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .nav button:hover {
            background: #20C20E;
            color: #0a0a0a;
        }
        .content {
            background: #051005;
            border: 1px solid #20C20E;
            padding: 15px;
            flex-grow: 1;
            margin-bottom: 10px;
            overflow-y: auto;
            max-height: 300px;
        }
        .item-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-card {
            background: #0b1a0b;
            border: 1px solid #20C20E;
            padding: 8px;
            width: calc(33% - 12px);
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        .item-card:hover {
            background: #1a3a1a;
            border-color: #fff;
        }
        .loot-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .loot-btn {
            background: #0d200d;
            color: #20C20E;
            border: 2px solid #20C20E;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loot-btn:hover {
            background: #20C20E;
            color: #0a0a0a;
        }
        .result-box {
            background: #051005;
            border: 1px solid #20C20E;
            padding: 15px;
            text-align: center;
            min-height: 60px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .inv-item {
            background: #0b1a0b;
            padding: 6px 10px;
            border: 1px solid #20C20E;
            font-size: 14px;
        }
        .log {
            font-size: 13px;
            opacity: 0.8;
            border-top: 1px dotted #20C20E;
            padding-top: 8px;
            margin-top: auto;
            min-height: 20px;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none; }
        .auth-box {
            background: #051005;
            border: 1px solid #20C20E;
            padding: 20px;
            text-align: center;
        }
        .auth-box input {
            background: #0b1a0b;
            border: 1px solid #20C20E;
            color: #20C20E;
            padding: 10px;
            margin: 5px 0;
            width: 80%;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }
        .auth-box button {
            background: #0d200d;
            color: #20C20E;
            border: 2px solid #20C20E;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
        }
        .auth-box button:hover {
            background: #20C20E;
            color: #0a0a0a;
        }
        .error-text {
            color: #ff4444;
            margin-top: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="crt">
    <div class="screen" id="appScreen">
        <!-- Динамический рендер -->
    </div>
</div>

<script>
    // ==================== ХРАНИЛИЩЕ ДАННЫХ (localStorage) ====================
    const STORAGE_KEY = 'gephard_terminal_users';

    function getAllUsers() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
    }

    function saveAllUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    // Простой хэш пароля (не криптостойкий, но пароли не хранятся открытым текстом)
    function hashPassword(password) {
        let hash = 0;
        const str = password + 'GEPHARD_SALT_217';
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0;
        }
        return hash.toString(16);
    }

    // ==================== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ====================
    let currentUser = null;   // логин текущего пользователя
    let userData = { tokens: 3, inventory: [] };
    let currentTab = 'shop';

    // Таблицы лута
    const commonLoot = [
        "Банка тушенки (просрочка)", "Фляга с водой", "Бинт стерильный",
        "Батарейки АА", "Пачка галет", "Моток лески",
        "Резиновый пупс", "Ненужная флешка", "Ржавый гвоздь",
        "Довоенная газета"
    ];
    const rareLoot = [
        "Набор отмычек", "Фонарь с динамо-машиной", "Карта местности",
        "Сигнальная ракетница", "Универсальный глушитель", "Доза антирадина",
        "Прочный рюкзак", "Когти крота"
    ];
    const legendaryLoot = [
        "Портативный очиститель воды", "Генератор белого шума", "Силовая батарея МП-8",
        "Имплант 'Зоркий глаз'", "Чертеж экзоскелета", "Ключ-пропуск в Убежище 17"
    ];

    // ==================== РЕНДЕРИНГ ====================
    function renderApp() {
        if (!currentUser) {
            renderAuthScreen();
            return;
        }
        renderMainScreen();
    }

    function renderAuthScreen() {
        document.getElementById('appScreen').innerHTML = `
            <h1>⚡ ГЕФЕСТ v.3 ⚡</h1>
            <div class="auth-box">
                <p>ТЕРМИНАЛ ЗАЩИЩЁН. ВОЙДИТЕ ИЛИ ЗАРЕГИСТРИРУЙТЕСЬ.</p>
                <input id="loginInput" type="text" placeholder="ЛОГИН"><br>
                <input id="passwordInput" type="password" placeholder="ПАРОЛЬ"><br>
                <button id="loginBtn">ВХОД</button>
                <button id="registerBtn">РЕГИСТРАЦИЯ</button>
                <div class="error-text" id="authError"></div>
            </div>
            <div class="log" style="margin-top:10px;">> ДОБРО ПОЖАЛОВАТЬ, ВЫЖИВШИЙ.</div>
        `;
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('registerBtn').addEventListener('click', register);
        // Enter по паролю
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    }

    function renderMainScreen() {
        document.getElementById('appScreen').innerHTML = `
            <h1>⚡ ГЕФЕСТ v.3 ⚡</h1>
            <div class="user-bar">
                <span>👤 ${currentUser}</span>
                <button id="logoutBtn" style="background:none; border:1px solid #20C20E; color:#20C20E; padding:4px 8px; cursor:pointer;">ВЫХОД</button>
            </div>
            <div class="balance">
                <span>БАЛАНС:</span>
                <span id="tokenDisplay">${userData.tokens} ЖЕТОН${userData.tokens === 1 ? '' : 'ОВ'}</span>
            </div>
            <div class="nav">
                <button id="shopTab">МАГАЗИН</button>
                <button id="lootTab">ЛУТБОКСЫ</button>
                <button id="inventoryTab">ИНВЕНТАРЬ</button>
            </div>
            <div id="dynamicContent" class="content"></div>
            <div class="log" id="logMessage">> СИСТЕМА ГОТОВА. ВЫБЕРИТЕ ДЕЙСТВИЕ.</div>
        `;
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('shopTab').addEventListener('click', () => showTab('shop'));
        document.getElementById('lootTab').addEventListener('click', () => showTab('loot'));
        document.getElementById('inventoryTab').addEventListener('click', () => showTab('inventory'));
        showTab(currentTab);
    }

    function showTab(tab) {
        currentTab = tab;
        const contentDiv = document.getElementById('dynamicContent');
        if (!contentDiv) return;
        switch(tab) {
            case 'shop':
                contentDiv.innerHTML = `
                    <div class="item-grid">
                        <div class="item-card" onclick="buyItem('patrons', 1)">🔫 ПАТРОНЫ<br><small>1 жетон</small></div>
                        <div class="item-card" onclick="buyItem('medkit', 2)">🏥 АПТЕЧКА<br><small>2 жетона</small></div>
                        <div class="item-card" onclick="buyItem('battery', 1)">🔋 БАТАРЕЯ<br><small>1 жетон</small></div>
                        <div class="item-card" onclick="buyItem('water', 1)">💧 ВОДА<br><small>1 жетон</small></div>
                    </div>
                    <p style="text-align:center; margin-top:10px; opacity:0.7;">[ ЖЕТОНЫ ВЫДАЁТ МАСТЕР ]</p>
                `;
                break;
            case 'loot':
                contentDiv.innerHTML = `
                    <div class="result-box" id="lootResult"><span>ВЫБЕРИТЕ КАПСУЛУ</span></div>
                    <div class="loot-options">
                        <button class="loot-btn" onclick="openLootbox(1)"><span>📦 ГУМАНИТАРКА</span><span>1 ЖЕТОН</span></button>
                        <button class="loot-btn" onclick="openLootbox(2)"><span>📦 БАРАХЛО-Х</span><span>2 ЖЕТОНА</span></button>
                        <button class="loot-btn" onclick="openLootbox(3)"><span>📦 СПЕЦИАЛИСТ</span><span>3 ЖЕТОНА</span></button>
                    </div>
                `;
                break;
            case 'inventory':
                let invHTML = '<div class="inventory-list">';
                if (userData.inventory.length === 0) {
                    invHTML += '<p style="text-align:center;">ИНВЕНТАРЬ ПУСТ</p>';
                } else {
                    userData.inventory.forEach(item => {
                        invHTML += `<div class="inv-item">• ${item}</div>`;
                    });
                }
                invHTML += '</div>';
                contentDiv.innerHTML = invHTML;
                break;
        }
    }

    function log(text) {
        const logEl = document.getElementById('logMessage');
        if (logEl) logEl.innerHTML = '> ' + text;
    }

    function updateBalanceDisplay() {
        const el = document.getElementById('tokenDisplay');
        if (el) el.innerText = userData.tokens + ' ЖЕТОН' + (userData.tokens === 1 ? '' : 'ОВ');
    }

    function saveUserDataToStorage() {
        const users = getAllUsers();
        if (users[currentUser]) {
            users[currentUser].data = { ...userData };
            saveAllUsers(users);
        }
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function login() {
        const loginInput = document.getElementById('loginInput').value.trim().toLowerCase();
        const passwordInput = document.getElementById('passwordInput').value;
        const errorEl = document.getElementById('authError');

        if (!loginInput || !passwordInput) {
            errorEl.innerText = 'ВВЕДИТЕ ЛОГИН И ПАРОЛЬ.';
            return;
        }

        const users = getAllUsers();
        const user = users[loginInput];

        if (!user) {
            errorEl.innerText = 'ПОЛЬЗОВАТЕЛЬ НЕ НАЙДЕН.';
            return;
        }

        if (user.passwordHash !== hashPassword(passwordInput)) {
            errorEl.innerText = 'НЕВЕРНЫЙ ПАРОЛЬ.';
            return;
        }

        // Успешный вход
        errorEl.innerText = '';
        currentUser = loginInput;
        userData = { ...user.data };
        if (!userData.inventory) userData.inventory = [];
        renderApp();
    }

    function register() {
        const loginInput = document.getElementById('loginInput').value.trim().toLowerCase();
        const passwordInput = document.getElementById('passwordInput').value;
        const errorEl = document.getElementById('authError');

        if (!loginInput || !passwordInput) {
            errorEl.innerText = 'ВВЕДИТЕ ЛОГИН И ПАРОЛЬ.';
            return;
        }

        if (loginInput.length < 3) {
            errorEl.innerText = 'ЛОГИН ДОЛЖЕН БЫТЬ НЕ МЕНЕЕ 3 СИМВОЛОВ.';
            return;
        }

        if (passwordInput.length < 4) {
            errorEl.innerText = 'ПАРОЛЬ ДОЛЖЕН БЫТЬ НЕ МЕНЕЕ 4 СИМВОЛОВ.';
            return;
        }

        const users = getAllUsers();

        if (users[loginInput]) {
            errorEl.innerText = 'ТАКОЙ ПОЛЬЗОВАТЕЛЬ УЖЕ СУЩЕСТВУЕТ.';
            return;
        }

        // Создаём нового пользователя
        users[loginInput] = {
            passwordHash: hashPassword(passwordInput),
            data: { tokens: 3, inventory: [] }
        };
        saveAllUsers(users);

        // Автоматический вход
        errorEl.innerText = '';
        currentUser = loginInput;
        userData = { tokens: 3, inventory: [] };
        renderApp();
        log('РЕГИСТРАЦИЯ УСПЕШНА. ДОБРО ПОЖАЛОВАТЬ, ВЫЖИВШИЙ ' + loginInput.toUpperCase() + '.');
    }

    function logout() {
        saveUserDataToStorage();
        currentUser = null;
        userData = { tokens: 3, inventory: [] };
        currentTab = 'shop';
        renderApp();
    }

    // ==================== ИГРОВЫЕ ДЕЙСТВИЯ ====================
    window.buyItem = function(item, cost) {
        if (!currentUser) return;
        if (userData.tokens < cost) {
            log('ОШИБКА: НЕДОСТАТОЧНО ЖЕТОНОВ.');
            playSound('error');
            return;
        }
        userData.tokens -= cost;
        let itemName = '';
        switch(item) {
            case 'patrons': itemName = 'Патроны (10 шт.)'; break;
            case 'medkit': itemName = 'Аптечка'; break;
            case 'battery': itemName = 'Батарея'; break;
            case 'water': itemName = 'Фляга с водой'; break;
        }
        userData.inventory.push(itemName);
        updateBalanceDisplay();
        saveUserDataToStorage();
        log('КУПЛЕНО: ' + itemName + '. -' + cost + ' ЖЕТОН.');
        playSound('buy');
        if (currentTab === 'inventory') showTab('inventory');
    };

    window.openLootbox = function(type) {
        if (!currentUser) return;
        let cost = 0;
        let table = [];
        let boxName = '';

        switch(type) {
            case 1: cost = 1; table = commonLoot; boxName = 'ГУМАНИТАРКА'; break;
            case 2: cost = 2; table = [...commonLoot, ...rareLoot]; boxName = 'БАРАХЛО-Х'; break;
            case 3: cost = 3; table = [...rareLoot, ...legendaryLoot]; boxName = 'СПЕЦИАЛИСТ'; break;
        }

        if (userData.tokens < cost) {
            log('ОШИБКА: НЕ ХВАТАЕТ ЖЕТОНОВ ДЛЯ ' + boxName + '.');
            playSound('error');
            return;
        }

        userData.tokens -= cost;
        updateBalanceDisplay();
        saveUserDataToStorage();

        const resultBox = document.getElementById('lootResult');
        if (resultBox) resultBox.innerHTML = '<span class="blink">АНАЛИЗ КАПСУЛЫ...</span>';
        log('ОТКРЫВАЕТСЯ ' + boxName + '...');
        playSound('loot');

        setTimeout(() => {
            const roll = Math.floor(Math.random() * 100) + 1;
            let item = '';
            let rarityText = '';
            let color = '#20C20E';

            if (type === 1) {
                item = commonLoot[Math.floor(Math.random() * commonLoot.length)];
                rarityText = '[ОБЫЧНЫЙ]';
            } else if (type === 2) {
                if (roll <= 70) {
                    item = commonLoot[Math.floor(Math.random() * commonLoot.length)];
                    rarityText = '[ОБЫЧНЫЙ]';
                } else {
                    item = rareLoot[Math.floor(Math.random() * rareLoot.length)];
                    rarityText = '[РЕДКИЙ]';
                    color = '#4A90E2';
                }
            } else if (type === 3) {
                if (roll <= 60) {
                    item = rareLoot[Math.floor(Math.random() * rareLoot.length)];
                    rarityText = '[РЕДКИЙ]';
                    color = '#4A90E2';
                } else {
                    item = legendaryLoot[Math.floor(Math.random() * legendaryLoot.length)];
                    rarityText = '[ЛЕГЕНДАРНЫЙ]';
                    color = '#F5A623';
                }
            }

            userData.inventory.push(item);
            saveUserDataToStorage();

            if (resultBox) {
                resultBox.innerHTML = `
                    <div style="font-size:20px; color:${color};">${item}</div>
                    <div style="font-size:14px; opacity:0.8;">${rarityText} | d100: ${roll}</div>
                `;
            }
            log('ПОЛУЧЕНО: ' + item + ' ' + rarityText);
            if (currentTab === 'inventory') showTab('inventory');
        }, 1500);
    };

    // ==================== ЗВУКИ ====================
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(type) {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'buy') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'loot') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(400, now + 0.2);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }

    // ==================== СТАРТ ====================
    renderApp();
</script>
</body>
</html>
