<!DOCTYPE html>
<html lang="ru" class="theme-green">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APOSTOL v2.0 (Beta) — Терминал</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgHum" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <!-- Загрузка -->
    <div id="loading" class="screen">
        <div class="crt"><h1>ЗАГРУЗКА...</h1></div>
    </div>

    <!-- Авторизация -->
    <div id="auth" class="screen hidden">
        <div class="crt">
            <h1>APOSTOL v2.0 (Beta)</h1>
            <div id="authForm">
                <input type="text" id="login" placeholder="ЛОГИН" autocomplete="off">
                <input type="password" id="password" placeholder="ПАРОЛЬ">
                <div class="btn-group">
                    <button id="signInBtn">ВОЙТИ</button>
                    <button id="signUpBtn">РЕГИСТРАЦИЯ</button>
                </div>
                <p id="authError" style="color:#FF5555;"></p>
            </div>
        </div>
    </div>

    <!-- Экран персонажей -->
    <div id="characterScreen" class="screen hidden">
    <div class="crt">
        <h1>APOSTOL v2.0 (Beta)</h1>
        <div id="characterContent" class="content" style="max-height:400px;"></div>
        <div id="masterPanel" style="margin-top:15px; display:none;">
            <button id="enterAdminFromCharBtn" style="width:100%;">🔑 АДМИН-ПАНЕЛЬ</button>
        </div>
        <button id="signOutFromCharBtn" style="margin-top:10px;">ВЫЙТИ</button>
    </div>
</div>

    <!-- Терминал -->
    <div id="terminal" class="screen hidden">
        <div class="crt">
            <h1>⚡ APOSTOL v2.0 (Beta) ⚡</h1>
            <div class="theme-switcher">
                <button class="theme-btn theme-green-btn active" onclick="setTheme('green')">🟢</button>
                <button class="theme-btn theme-amber-btn" onclick="setTheme('amber')">🟠</button>
                <button class="theme-btn theme-blue-btn" onclick="setTheme('blue')">🔵</button>
                <button class="theme-btn theme-red-btn" onclick="setTheme('red')">🔴</button>
            </div>
            <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
            <div class="balance">
                <span>БАЛАНС:</span>
                <span id="tokenDisplay">0 РК</span>
                <span id="charDisplay" style="font-size:10px;"></span>
                <button id="changeCharBtn" style="font-size:8px; padding:4px 6px;">СМЕНИТЬ</button>
                <button id="signOutTerminalBtn" style="font-size:8px; padding:4px 6px;">ВЫХОД</button>
            </div>
            <div class="nav">
                <button id="shopTab">🏪 МАГАЗИН</button>
                <button id="lootTab">🎲 ЛУТБОКСЫ</button>
                <button id="invTab">🎒 ИНВЕНТАРЬ</button>
                <button id="groupTab">👥 ГРУППА</button>
                <button id="adminTab" style="display:none;">🔑 АДМИН</button>
            </div>
            <div id="shopContent" class="content"></div>
            <div id="lootContent" class="content hidden"></div>
            <div id="inventoryContent" class="content hidden"></div>
            <div id="groupContent" class="content hidden"></div>
            <div id="adminContent" class="content hidden"></div>
            <div class="log" id="logMessage">> СИСТЕМА APOSTOL ГОТОВА.</div>
        </div>
    </div>

    <script>
        function setTheme(t) {
            document.documentElement.className = 'theme-' + t;
            localStorage.setItem('apostol-theme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.theme-' + t + '-btn')?.classList.add('active');
        }
        (() => setTheme(localStorage.getItem('apostol-theme') || 'green'))();
    </script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
