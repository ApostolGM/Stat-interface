<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APOSTOL — Торговая статуя</title>
    <link rel="stylesheet" href="css/themes.css">
</head>
<body>
<div class="terminal">
    <div class="header">
        <h1>APOSTOL</h1>
        <div class="header-controls">
            <div class="balance">
                РК: <span id="balanceDisplay">3</span>
            </div>
            <button id="soundToggle" class="sound-btn" title="Вкл/Выкл звук">🔊</button>
        </div>
    </div>

    <div class="main-tabs">
        <div class="main-tab active" data-tab="shop">Магазин</div>
        <div class="main-tab" data-tab="inventory">Инвентарь</div>
    </div>

    <div id="shopSubTabs" class="sub-tabs">
        <div class="sub-tab active" data-sub="food">Еда</div>
        <div class="sub-tab" data-sub="weapons">Оружие</div>
        <div class="sub-tab" data-sub="bestiary">Бестиарий</div>
        <div class="sub-tab" data-sub="lootboxes">Лутбоксы</div>
    </div>

    <div id="content" class="content"></div>
</div>

<!-- Модули -->
<script src="js/sound.js"></script>
<script src="js/shop-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
